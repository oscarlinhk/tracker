<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Control Panel</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 15px; margin-top: 15px; }
        button { background: #007aff; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        input, select { width: 100%; padding: 12px; font-size: 16px; margin: 8px 0 15px 0; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; }
        .status-bar { padding: 12px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; background: #e2e3e5; color: #383d41; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Tracker Control Hub</h2>
    <div id="status" class="status-bar">Status: Disconnected</div>
    <button id="connectBtn" onclick="connectDevice()">1. CONNECT TO TRACKER</button>
</div>

<div id="configs" class="card" style="opacity: 0.5; pointer-events: none;">
    <h3>2. Configure System Layout</h3>
    
    <div class="box">
        <label><b>Event 1 Title (Max 16 chars):</b></label>
        <input type="text" id="name0" value="Hair Cut" maxlength="16" oninput="sanitizeInput(this)">
        <label>Icon Style:</label>
        <select id="icon0"><option value="0">Scissors</option><option value="1">Gas Pump</option><option value="2">Suitcase</option></select>
        <label>Override Date (Optional):</label>
        <input type="date" id="date0">
    </div>

    <div class="box">
        <label><b>Event 2 Title (Max 16 chars):</b></label>
        <input type="text" id="name1" value="Add Gas" maxlength="16" oninput="sanitizeInput(this)">
        <label>Icon Style:</label>
        <select id="icon1"><option value="0">Scissors</option><option value="1">Gas Pump</option><option value="2">Suitcase</option></select>
        <label>Override Date (Optional):</label>
        <input type="date" id="date1">
    </div>

    <div class="box">
        <label><b>Event 3 Title (Max 16 chars):</b></label>
        <input type="text" id="name2" value="Travel" maxlength="16" oninput="sanitizeInput(this)">
        <label>Icon Style:</label>
        <select id="icon2"><option value="0">Scissors</option><option value="1">Gas Pump</option><option value="2">Suitcase</option></select>
        <label>Override Date (Optional):</label>
        <input type="date" id="date2">
    </div>
    
    <br>
    <button onclick="syncAllData()" style="background: #28a745;">3. SYNC ALL TO DEVICE</button>
</div>

<script>
const SERVICE_UUID = "4fa4c201-1fb5-459e-8fcc-c5c9c331914b";
const CHARACTERISTIC_UUID "beb5483e-36e1-4688-b7f5-ea07361b26a8";

let device = null;
let txChar = null;

// CRASH SHIELD SANITIZATION: Instantly strip out dangerous commas as user types
function sanitizeInput(inputElement) {
    inputElement.value = inputElement.value.replace(/,/g, "");
}

async function connectDevice() {
    updateStatus("Searching...", "#ffc107", "black");
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'E-Ink Tracker BLE' }],
            optionalServices: [SERVICE_UUID]
        });
        
        updateStatus("Connecting server...", "#ffc107", "black");
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        txChar = await service.getCharacteristic(CHARACTERISTIC_UUID);
        
        updateStatus("Connected & Synchronized!", "#28a745", "white");
        document.getElementById('configs').style.opacity = "1";
        document.getElementById('configs').style.pointerEvents = "auto";
    } catch (e) {
        updateStatus("Connection Failure: " + e.message, "#dc3545", "white");
    }
}

async function syncAllData() {
    if (!txChar) return alert("Device connection offline.");
    
    const nowInSeconds = Math.floor(Date.now() / 1000);
    const encoder = new TextEncoder();

    try {
        for (let i = 0; i < 3; i++) {
            updateStatus(`Syncing Event ${i+1}...`, "#17a2b8", "white");

            let name = document.getElementById(`name${i}`).value || "No Name";
            let icon = document.getElementById(`icon${i}`).value;
            let dateVal = document.getElementById(`date${i}`).value;

            let resetTargetTimestamp = nowInSeconds;
            if (dateVal) {
                let d = new Date(dateVal + "T12:00:00"); 
                resetTargetTimestamp = Math.floor(d.getTime() / 1000);
            }

            // Clean CSV packet construction
            let csvPacket = `${i},${name},${icon},${resetTargetTimestamp},${nowInSeconds}`;
            await txChar.writeValue(encoder.encode(csvPacket));
            await new Promise(r => setTimeout(r, 250));
        }

        updateStatus("Sync Completed successfully!", "#28a745", "white");
        await new Promise(r => setTimeout(r, 500));
        await device.gatt.disconnect();
        updateStatus("Disconnected safely.", "#6c757d", "white");
        document.getElementById('configs').style.opacity = "0.5";
        document.getElementById('configs').style.pointerEvents = "none";
    } catch(err) {
        updateStatus("Transfer Interrupted: " + err.message, "#dc3545", "white");
    }
}

function updateStatus(txt, bg, col) {
    let el = document.getElementById("status");
    el.innerText = "Status: " + txt;
    el.style.backgroundColor = bg;
    el.style.color = col;
}
</script>
</body>
</html>
